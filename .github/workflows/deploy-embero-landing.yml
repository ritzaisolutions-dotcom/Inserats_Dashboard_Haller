name: Deploy Embero Landing Page

on:
  push:
    branches:
      - claude/embero-shopify-redesign-4ebswr
      - main
    paths:
      - 'demos/embero.store/landing-page-9/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel (embero-store-landing)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: demos/embero.store/landing-page-9
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_cgCRh7QIoVhXHiN6Q194MPb0
          VERCEL_PROJECT_ID: prj_2ZO6DT1cHRAeGMSsnl2RQCL40Ejy
        run: |
          vercel deploy \
            --yes \
            --prod \
            --token "$VERCEL_TOKEN"
